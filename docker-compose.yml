version: "3.8"

# =============================================================================
# ML Feature Engineering Pipeline — Docker Compose
#
# Services (one per microservice):
#   zookeeper      — Kafka coordination
#   kafka          — Event bus
#   kafka-init     — One-shot topic creation
#   jobmanager     — Flink cluster coordinator
#   taskmanager    — Flink worker
#   flink-job      — Builds fat JAR and submits it to Flink (REQ flink-job)
#   producer       — Data-generator microservice
#   dashboard      — Observability dashboard microservice
#
# Every service has a healthcheck (REQ-1).
# =============================================================================

services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT:-2181}
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  # ── Topic Initialisation ───────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo '[kafka-init] Creating topics...'
      kafka-topics --bootstrap-server kafka:29092 \
        --create --if-not-exists \
        --topic user-events \
        --partitions 3 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 \
        --create --if-not-exists \
        --topic content-metadata \
        --partitions 1 --replication-factor 1 \
        --config cleanup.policy=compact

      kafka-topics --bootstrap-server kafka:29092 \
        --create --if-not-exists \
        --topic feature-store \
        --partitions 1 --replication-factor 1 \
        --config cleanup.policy=compact

      kafka-topics --bootstrap-server kafka:29092 \
        --create --if-not-exists \
        --topic flink-metrics \
        --partitions 1 --replication-factor 1

      echo '[kafka-init] Topics:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092",
             "--describe", "--topic", "feature-store"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flink Job Manager ──────────────────────────────────────────────────────
  jobmanager:
    image: flink:1.18.0-java11
    container_name: jobmanager
    restart: unless-stopped
    ports:
      - "${FLINK_UI_PORT:-8081}:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m
        rest.bind-port: 8081
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  # ── Flink Task Manager ─────────────────────────────────────────────────────
  taskmanager:
    image: flink:1.18.0-java11
    container_name: taskmanager
    restart: unless-stopped
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 1728m
    healthcheck:
      test: ["CMD-SHELL",
             "curl -sf http://jobmanager:8081/taskmanagers | grep -c 'id' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── Flink Job Submitter ────────────────────────────────────────────────────
  # Builds the fat JAR (maven shade) and submits it to the running cluster.
  flink-job:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    container_name: flink-job
    restart: on-failure
    depends_on:
      jobmanager:
        condition: service_healthy
      taskmanager:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}

  # ── Data Producer Microservice ─────────────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    restart: unless-stopped
    ports:
      - "${PRODUCER_PORT:-8080}:8080"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  # ── Observability Dashboard Microservice ───────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8082}:8082"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      SERVER_PORT: 8082
      SPRING_KAFKA_CONSUMER_GROUP_ID: dashboard-group
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s
